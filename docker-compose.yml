services:
  postgres:
    image: postgres:16-alpine
    container_name: veil-wallet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: veil_wallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "9876:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d veil_wallet"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
